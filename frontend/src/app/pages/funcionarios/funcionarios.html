<div class="cards-container">
  <app-card
    title="Total de funcionários"
    [value]="cards.total"
    icon="badge"
    iconColor="#3B82F6"
  ></app-card>
  <app-card
    title="Funcionarios Ativos"
    [value]="cards.active"
    icon="check_circle"
    iconColor="#22C55E"
  ></app-card>
  <app-card
    title="Funcionarios Em licença"
    [value]="cards.onLeave"
    icon="schedule"
    iconColor="#F59E0B"
  ></app-card>
  <app-card
    title="Funcionarios Inativos"
    [value]="cards.inactive"
    icon="cancel"
    iconColor="#EF4444"
  ></app-card>
</div>

<div class="table-header">
  <div class="table-header-text">
    <h2>Funcionários</h2>
    <p>Gerencie colaboradores e seus status.</p>
  </div>
  <button class="btn-add" (click)="openDialog()">
    <span class="material-icons">add</span>
    Adicionar Funcionário
  </button>
</div>

<div class="main-table-card">
  <app-data-table
    [columns]="columns"
    [dataSource]="funcionarios"
    [statusMap]="statusMap"
    (edit)="onEdit($event)"
    (delete)="onDelete($event)"
  >
  </app-data-table>

  <app-pagination
    [totalElements]="totalElements"
    [currentPage]="currentPage"
    [pageSize]="pageSize"
    (pageChange)="onPageChange($event)"
  >
  </app-pagination>
</div>
