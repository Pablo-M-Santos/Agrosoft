<div class="cards-container">
  <app-card
    title="Total de máquinas"
    [value]="cards.total"
    icon="build"
    iconColor="#3B82F6"
  ></app-card>
  <app-card
    title="Máquinas Operacionais"
    [value]="cards.operational"
    icon="check_circle"
    iconColor="#22C55E"
  ></app-card>
  <app-card
    title="Em Manutenção"
    [value]="cards.underMaintenance"
    icon="build_circle"
    iconColor="#F59E0B"
  ></app-card>
  <app-card
    title="Máquinas Inativas"
    [value]="cards.inactive"
    icon="cancel"
    iconColor="#EF4444"
  ></app-card>
</div>

<div class="table-header">
  <div class="table-header-text">
    <h2>Máquinas</h2>
    <p>Gerencie máquinas, tipos, status e responsáveis.</p>
  </div>
  <button class="btn-add" (click)="openDialog()">
    <span class="material-icons">add</span>
    Adicionar Máquina
  </button>
</div>

<div class="main-table-card">
  <app-data-table
    [columns]="columns"
    [dataSource]="machines"
    [statusMap]="statusMap"
    (view)="onView($event)"
    (edit)="onEdit($event)"
    (delete)="onDelete($event)"
  >
  </app-data-table>
  <app-pagination
    [totalElements]="totalElements"
    [currentPage]="currentPage"
    [pageSize]="pageSize"
    (pageChange)="onPageChange($event)"
  >
  </app-pagination>
</div>
