<div class="cards-container">
  <app-card
    title="Total de animais"
    [value]="cards.total"
    icon="pets"
    iconColor="#3B82F6"
  ></app-card>
  <app-card title="Na fazenda" [value]="cards.active" icon="home" iconColor="#22C55E"></app-card>
  <app-card title="Vendidos" [value]="cards.sold" icon="sell" iconColor="#EF4444"></app-card>
  <app-card
    title="Em tratamento"
    [value]="cards.underCare"
    icon="medical_services"
    iconColor="#F59E0B"
  ></app-card>
</div>

<div class="table-header">
  <div class="table-header-text">
    <h2>Animais</h2>
    <p>Gerencie animais, tipos, status e responsáveis.</p>
  </div>
  <button class="btn-add" (click)="openDialog()">
    <span class="material-icons">add</span>
    Adicionar Animal
  </button>
</div>

<div class="main-table-card">
  <app-data-table
    [columns]="columns"
    [dataSource]="animals"
    [statusMap]="statusMap"
    (view)="onView($event)"
    (edit)="onEdit($event)"
    (delete)="onDelete($event)"
  >
  </app-data-table>
  <app-pagination
    [totalElements]="totalElements"
    [currentPage]="currentPage"
    [pageSize]="pageSize"
    (pageChange)="onPageChange($event)"
  >
  </app-pagination>
</div>
