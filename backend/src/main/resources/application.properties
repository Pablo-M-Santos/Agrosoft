spring.datasource.url=${SPRING_URL:jdbc:postgresql://localhost:5433/agrosoft}
spring.datasource.username=${SPRING_USER:postgres}
spring.datasource.password=${SPRING_PASSWORD:admin}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.port=${PORT:8080}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT security
app.security.jwt.secret=${APP_JWT_SECRET:QWdyb3NvZnRTZWN1cmVKd3RLZXlGb3JEZXZFbmx5TWluaW11bTMyQnl0ZXM=}
app.security.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}